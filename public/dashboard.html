<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA SaaS · Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080808;
            --surface:  #101010;
            --surface2: #161616;
            --border:   #1e1e1e;
            --border2:  #2a2a2a;
            --accent:   #00e676;
            --accent2:  #00bcd4;
            --accent-dim: rgba(0,230,118,0.1);
            --text:     #e8e8e8;
            --text2:    #aaa;
            --muted:    #555;
            --danger:   #ff4d4d;
            --warn:     #ffa726;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'Space Grotesk', sans-serif;
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Subtle grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,230,118,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.015) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── TOPBAR ─── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,8,8,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .brand-dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(1.3); }
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-chip {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 2px;
        }

        .stat-chip span { color: var(--accent); font-weight: 600; }

        .btn-logout {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            background: none;
            border: 1px solid var(--border);
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* ─── MAIN LAYOUT ─── */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            padding: 40px 32px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 32px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .page-title h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .page-title p {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text2);
            font-weight: 300;
        }

        /* ─── ADD CLIENT PANEL ─── */
        .add-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 24px 28px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
        }

        .add-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
        }

        .add-panel h3 {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .add-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .field {
            flex: 1;
            min-width: 180px;
        }

        .field label {
            display: block;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            border-radius: 2px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,230,118,0.07);
        }

        .field input::placeholder { color: var(--muted); }

        .btn-add {
            padding: 10px 22px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            white-space: nowrap;
            transition: background 0.15s, transform 0.1s;
            height: 40px;
        }

        .btn-add:hover { background: #1ffb89; }
        .btn-add:active { transform: scale(0.98); }

        /* ─── SECTION HEADER ─── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .badge {
            background: var(--accent-dim);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0,230,118,0.2);
        }

        /* ─── INSTANCE GRID ─── */
        #clients {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        /* ─── INSTANCE CARD ─── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s;
            animation: cardIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card:hover { border-color: var(--border2); }

        .card-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .instance-info { flex: 1; min-width: 0; }

        .instance-name {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .instance-webhook {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.08em;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-badge.idle    { background: rgba(85,85,85,0.2); color: var(--muted); border: 1px solid #333; }
        .status-badge.running { background: rgba(0,230,118,0.1); color: var(--accent); border: 1px solid rgba(0,230,118,0.25); }
        .status-badge.waiting { background: rgba(255,167,38,0.1); color: var(--warn); border: 1px solid rgba(255,167,38,0.25); }

        /* Card body */
        .card-body { padding: 16px 20px; }

        /* QR area */
        .qr-area {
            display: none;
            margin-top: 14px;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            text-align: center;
        }

        .qr-area.show { display: block; }

        .qr-area img { max-width: 180px; margin: 0 auto; display: block; }

        .qr-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 0.08em;
        }

        /* Action buttons row */
        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 0;
            padding: 8px 10px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
            border-radius: 2px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            transition: all 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: var(--border2); color: var(--text); }

        .btn.start  { border-color: rgba(0,230,118,0.3); color: var(--accent); }
        .btn.start:hover { background: rgba(0,230,118,0.1); }

        .btn.qr     { border-color: rgba(0,188,212,0.3); color: var(--accent2); }
        .btn.qr:hover { background: rgba(0,188,212,0.1); }

        .btn.delete { border-color: rgba(255,77,77,0.2); color: #ff7070; }
        .btn.delete:hover { background: rgba(255,77,77,0.1); border-color: rgba(255,77,77,0.4); }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            border: 1px dashed var(--border);
            border-radius: 2px;
        }

        .empty-state .icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 12px;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { border-left: 3px solid var(--accent); }
        .toast.error   { border-left: 3px solid var(--danger); }

        /* ─── MODAL ─── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.show { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 2px;
            padding: 32px;
            width: 420px;
            max-width: 90vw;
            position: relative;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        .modal h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal p {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 20px;
        }

        .modal input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 13px;
            outline: none;
            border-radius: 2px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .btn-cancel {
            padding: 10px 20px;
            background: none;
            border: 1px solid var(--border2);
            color: var(--text2);
            font-family: var(--font-mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s;
        }
        .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

        .btn-confirm {
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.15s;
        }
        .btn-confirm:hover { background: #1ffb89; }

        .btn-confirm.danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-confirm.danger:hover { background: #ff6b6b; }

        /* loading spinner */
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(0,230,118,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="brand">
        <div class="brand-dot"></div>
        WA SaaS Console
    </div>
    <div class="topbar-right">
        <div class="stat-chip">
            Instances: <span id="instanceCount">—</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<!-- MAIN -->
<main>

    <div class="page-header">
        <div class="page-title">
            <h1>Instances</h1>
            <p>Manage WhatsApp connections · scan QR · configure webhooks</p>
        </div>
    </div>

    <!-- ADD FORM -->
    <div class="add-panel">
        <h3>+ New Instance</h3>
        <div class="add-form">
            <div class="field">
                <label>Instance Name</label>
                <input id="instanceInput" type="text" placeholder="e.g. client-acme" autocomplete="off">
            </div>
            <div class="field">
                <label>Webhook URL</label>
                <input id="webhookInput" type="url" placeholder="https://your-app.com/webhook">
            </div>
            <button class="btn-add" onclick="addClient()">Add Instance</button>
        </div>
    </div>

    <!-- INSTANCE LIST -->
    <div class="section-header">
        <div class="section-title">Active Instances</div>
        <div class="badge" id="countBadge">0 total</div>
    </div>

    <div id="clients">
        <div class="empty-state">
            <div class="icon">📭</div>
            <h3>Loading instances…</h3>
            <p><span class="spinner"></span></p>
        </div>
    </div>

</main>

<!-- WEBHOOK EDIT MODAL -->
<div class="modal-backdrop" id="webhookModal">
    <div class="modal">
        <h3>Edit Webhook</h3>
        <p>Update the webhook URL for <strong id="webhookModalName"></strong></p>
        <input type="url" id="webhookModalInput" placeholder="https://your-app.com/webhook">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('webhookModal')">Cancel</button>
            <button class="btn-confirm" onclick="confirmWebhook()">Save Webhook</button>
        </div>
    </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-backdrop" id="deleteModal">
    <div class="modal">
        <h3>Delete Instance</h3>
        <p>Are you sure you want to delete <strong id="deleteModalName"></strong>? This cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal('deleteModal')">Cancel</button>
            <button class="btn-confirm danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
    const API_KEY = localStorage.getItem("API_KEY");
    if (!API_KEY) window.location = "/";

    let pendingWebhookName = null;
    let pendingDeleteName  = null;

    // ── HELPERS ──────────────────────────────────────────────────

    function headers(extra = {}) {
        return { "x-api-key": API_KEY, ...extra };
    }

    function toast(msg, type = "success") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `toast ${type} show`;
        clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.remove("show"), 3000);
    }

    function openModal(id)  { document.getElementById(id).classList.add("show"); }
    function closeModal(id) { document.getElementById(id).classList.remove("show"); }

    function logout() {
        localStorage.removeItem("API_KEY");
        window.location = "/";
    }

    async function api(url, opts = {}) {
        const res = await fetch(url, {
            ...opts,
            headers: {
                ...headers(opts.contentType ? { "Content-Type": "application/json" } : {}),
                ...(opts.headers || {})
            }
        });

        if (res.status === 401) {
            localStorage.removeItem("API_KEY");
            window.location = "/";
            throw new Error("Unauthorized");
        }

        return res;
    }

    // ── LOAD CLIENTS ─────────────────────────────────────────────

    async function loadClients() {
        try {
            const res = await api("/admin/clients");
            const clients = await res.json();

            const count = clients.length;
            document.getElementById("instanceCount").textContent = count;
            document.getElementById("countBadge").textContent = `${count} total`;

            if (count === 0) {
                document.getElementById("clients").innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>No instances yet</h3>
                        <p>Add your first WhatsApp instance above</p>
                    </div>
                `;
                return;
            }

            document.getElementById("clients").innerHTML = clients.map((c, i) => `
                <div class="card" style="animation-delay:${i * 0.04}s">
                    <div class="card-header">
                        <div class="instance-info">
                            <div class="instance-name">${escHtml(c.instanceName)}</div>
                            <div class="instance-webhook">${escHtml(c.webhookUrl || '—')}</div>
                        </div>
                        <div class="status-badge idle" id="status-${escHtml(c.instanceName)}">● idle</div>
                    </div>
                    <div class="card-body">
                        <div class="card-actions">
                            <button class="btn start" onclick="startClient('${escHtml(c.instanceName)}')">▶ Start</button>
                            <button class="btn qr"    onclick="getQR('${escHtml(c.instanceName)}')">QR Code</button>
                            <button class="btn"       onclick="openEditWebhook('${escHtml(c.instanceName)}', '${escHtml(c.webhookUrl || '')}')">Webhook</button>
                            <button class="btn delete" onclick="openDeleteConfirm('${escHtml(c.instanceName)}')">✕ Delete</button>
                        </div>
                        <div class="qr-area" id="qr-${escHtml(c.instanceName)}"></div>
                    </div>
                </div>
            `).join("");

        } catch (err) {
            if (err.message !== "Unauthorized") {
                toast("Failed to load instances", "error");
            }
        }
    }

    // ── ADD CLIENT ───────────────────────────────────────────────

    async function addClient() {
        const instanceName = document.getElementById("instanceInput").value.trim();
        const webhookUrl   = document.getElementById("webhookInput").value.trim();

        if (!instanceName) { toast("Enter an instance name", "error"); return; }

        try {
            const res = await api("/admin/add-client", {
                method: "POST",
                contentType: true,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ instanceName, webhookUrl })
            });

            if (!res.ok) { toast("Failed to add instance", "error"); return; }

            document.getElementById("instanceInput").value = "";
            document.getElementById("webhookInput").value  = "";
            toast(`Instance "${instanceName}" added`);
            loadClients();
        } catch (e) { /* auth redirect handled */ }
    }

    // ── START CLIENT ─────────────────────────────────────────────

    async function startClient(name) {
        const statusEl = document.getElementById(`status-${name}`);
        if (statusEl) { statusEl.className = "status-badge waiting"; statusEl.textContent = "● starting"; }

        try {
            await api(`/admin/start/${encodeURIComponent(name)}`);
            if (statusEl) { statusEl.className = "status-badge running"; statusEl.textContent = "● running"; }
            toast(`"${name}" started`);
        } catch (e) {
            if (statusEl) { statusEl.className = "status-badge idle"; statusEl.textContent = "● idle"; }
        }
    }

    // ── GET QR ───────────────────────────────────────────────────

    async function getQR(name) {

    const qrEl =
        document.getElementById(
            `qr-${name}`
        );

    qrEl.classList.add("show");

    async function refresh() {

        try {

            const res =
                await api(
                    `/admin/qr/${name}`
                );

            qrEl.innerHTML =
                await res.text();

            if (
                qrEl.innerHTML.includes(
                    "<img"
                )
            ) {
                return;
            }

            setTimeout(
                refresh,
                3000
            );

        } catch(e) {

            qrEl.innerHTML =
                "QR Failed";
        }
    }

    refresh();
}
    // ── WEBHOOK EDIT ─────────────────────────────────────────────

    function openEditWebhook(name, currentUrl) {
        pendingWebhookName = name;
        document.getElementById("webhookModalName").textContent  = name;
        document.getElementById("webhookModalInput").value = currentUrl;
        openModal("webhookModal");
    }

    async function confirmWebhook() {
        const webhookUrl = document.getElementById("webhookModalInput").value.trim();
        if (!webhookUrl) { toast("Enter a webhook URL", "error"); return; }

        try {
            await api(`/admin/update-webhook/${encodeURIComponent(pendingWebhookName)}`, {
                method: "PUT",
                contentType: true,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ webhookUrl })
            });

            closeModal("webhookModal");
            toast(`Webhook updated for "${pendingWebhookName}"`);
            loadClients();
        } catch (e) { /* handled */ }
    }

    // ── DELETE ───────────────────────────────────────────────────

    function openDeleteConfirm(name) {
        pendingDeleteName = name;
        document.getElementById("deleteModalName").textContent = name;
        openModal("deleteModal");
    }

    async function confirmDelete() {
        try {
            await api(`/admin/delete-client/${encodeURIComponent(pendingDeleteName)}`, {
                method: "DELETE"
            });

            closeModal("deleteModal");
            toast(`"${pendingDeleteName}" deleted`);
            loadClients();
        } catch (e) { /* handled */ }
    }

    // ── UTILS ────────────────────────────────────────────────────

    function escHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    // Close modals on backdrop click
    document.querySelectorAll(".modal-backdrop").forEach(el => {
        el.addEventListener("click", e => {
            if (e.target === el) el.classList.remove("show");
        });
    });

    // Enter key on add form
    ["instanceInput", "webhookInput"].forEach(id => {
        document.getElementById(id).addEventListener("keydown", e => {
            if (e.key === "Enter") addClient();
        });
    });

    loadClients();
</script>

</body>
</html>
